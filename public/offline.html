<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne — CESI Stages</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 420px; box-shadow: 0 4px 24px rgba(15,23,42,0.08); }
        .icon { width: 72px; height: 72px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 2rem; }
        h1 { font-size: 1.4rem; font-weight: 800; color: #161b26; margin-bottom: 12px; }
        p { color: #667085; line-height: 1.6; margin-bottom: 28px; }
        a { display: inline-block; padding: 12px 28px; background: #d71920; color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; }
        a:hover { background: #b5141a; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>Impossible de se connecter au serveur. Vérifiez votre connexion internet et réessayez.</p>
        <a href="/" onclick="location.reload()">Réessayer</a>
    </div>
</body>
</html>
